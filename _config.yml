title: "RH LLM Exploration"
description: "AI-generated 7-cycle honest exploration of the Riemann Hypothesis. Not a proof. 0/10 mathematical progress. 0 hallucinations across 200+ attempts."
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-relative-links
  - jekyll-seo-tag
relative_links:
  enabled: true
  collections: true
include:
  - en
  - ko
exclude:
  - tools/__pycache__
  - "*.lock"
  - .gitignore
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  math_engine: mathjax
defaults:
  - scope:
      path: ""
    values:
      layout: default
