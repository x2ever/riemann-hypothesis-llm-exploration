title: "RH LLM Exploration"
description: "An AI tried to prove the Riemann Hypothesis 200+ times and didn't. Browse the honest failure log of an LLM kept on an unsolved problem for 6 months."

# Canonical site URL — used by jekyll-seo-tag, jekyll-sitemap, and absolute_url filters
url: "https://x2ever.github.io"
baseurl: "/riemann-hypothesis-llm-exploration"

# Site language (per-page <html lang> is overridden by client-side i18n.js based on URL)
lang: en

# Author / contact (used by jekyll-seo-tag JSON-LD)
author:
  name: "x2ever"
  email: "x2ever.han@gmail.com"
  twitter: ""

# OpenGraph default image (1200x630, used as fallback for share cards)
image: /assets/og-image.png

# Twitter Card metadata (jekyll-seo-tag)
twitter:
  card: summary_large_image

# Logo (just-the-docs may pick this up; also used by jekyll-seo-tag)
logo: /assets/og-image.png

# Social links for jekyll-seo-tag JSON-LD
social:
  name: "RH LLM Exploration"
  links:
    - "https://github.com/x2ever/riemann-hypothesis-llm-exploration"

remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme
  - jekyll-relative-links
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# just-the-docs configuration
search_enabled: true
search:
  heading_level: 2
  previews: 2
  preview_words_before: 3
  preview_words_after: 3
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

heading_anchors: true

# Aux links (top right corner)
aux_links:
  "GitHub":
    - "https://github.com/x2ever/riemann-hypothesis-llm-exploration"

aux_links_new_tab: true

# Footer content
footer_content: "AI-generated. Not a proof. RH-progress: 0/10. Contact: x2ever.han@gmail.com"

# Last edit info
last_edit_timestamp: true
last_edit_time_format: "%Y-%m-%d"

# Color scheme (light)
color_scheme: nil

relative_links:
  enabled: true
  collections: true

include:
  - en
  - ko

exclude:
  - tools/__pycache__
  - "*.lock"
  - .gitignore
  - attempts/
  - lemmas/
  - learnings/
  - papers/
  - background/

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  math_engine: mathjax

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "en"
      type: "pages"
    values:
      lang: en
  - scope:
      path: "ko"
      type: "pages"
    values:
      lang: ko

callouts:
  warning:
    title: ⚠️ Warning
    color: red
  note:
    title: Note
    color: blue
