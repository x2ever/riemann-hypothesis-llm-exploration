title: "RH LLM Exploration"
description: "AI-generated 7-cycle honest exploration of the Riemann Hypothesis. Not a proof. 0/10 mathematical progress. 0 hallucinations across 200+ attempts."

remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme
  - jekyll-relative-links
  - jekyll-seo-tag

# just-the-docs configuration
search_enabled: true
search:
  heading_level: 2
  previews: 2
  preview_words_before: 3
  preview_words_after: 3
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

heading_anchors: true

# Aux links (top right corner)
aux_links:
  "GitHub":
    - "https://github.com/x2ever/riemann-hypothesis-llm-exploration"

aux_links_new_tab: true

# Footer content
footer_content: "AI-generated. Not a proof. RH-progress: 0/10. Contact: x2ever.han@gmail.com"

# Last edit info
last_edit_timestamp: true
last_edit_time_format: "%Y-%m-%d"

# Color scheme (light)
color_scheme: nil

relative_links:
  enabled: true
  collections: true

include:
  - en
  - ko

exclude:
  - tools/__pycache__
  - "*.lock"
  - .gitignore
  - attempts/
  - lemmas/
  - learnings/
  - papers/
  - background/

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  math_engine: mathjax

defaults:
  - scope:
      path: ""
    values:
      layout: default

callouts:
  warning:
    title: ⚠️ Warning
    color: red
  note:
    title: Note
    color: blue
